<?xml version="1.0" encoding="UTF-8"?>
<!-- Logo 4Selet (vetorial) — símbolo "4" + wordmark SELET. Variante dark (para fundos claros). -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 500" width="1600" height="500">
  <!-- símbolo "4" -->
  <svg x="40" y="90" width="320" height="320" viewBox="0 0 1080 1080">
    <rect width="1080" height="1080" rx="232" ry="232" fill="#5499B5"/>
    <g fill="none" stroke="#ffffff" stroke-width="124" stroke-linecap="round" stroke-linejoin="round">
      <path d="M648 196 V884"/>
      <path d="M648 196 L246 664 H854"/>
    </g>
  </svg>
  <!-- wordmark -->
  <text x="430" y="338" font-family="Inter, 'Segoe UI', Arial, sans-serif" font-size="300" font-weight="800" letter-spacing="6" fill="#07212B">SELET</text>
</svg>
