<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 168" role="img" aria-label="Fluxo de geração: do briefing à publicação assistida" font-family="Inter, -apple-system, Segoe UI, Roboto, Arial, sans-serif">
  <rect x="0" y="0" width="920" height="168" rx="14" fill="#f5f7f7" stroke="#dde4e6"/>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#5499B5"/>
    </marker>
    <style>
      .box{fill:#003554}
      .step .accent{fill:#5499B5}
      .lbl{fill:#D9DCD6;font-size:13px;font-weight:600;text-anchor:middle}
      .num{fill:#5499B5;font-size:11px;font-weight:700;text-anchor:middle}
      .flow{stroke:#5499B5;stroke-width:2;fill:none}
    </style>
  </defs>

  <!-- conectores -->
  <line class="flow" x1="146" y1="84" x2="164" y2="84" marker-end="url(#arrow)"/>
  <line class="flow" x1="294" y1="84" x2="312" y2="84" marker-end="url(#arrow)"/>
  <line class="flow" x1="442" y1="84" x2="460" y2="84" marker-end="url(#arrow)"/>
  <line class="flow" x1="590" y1="84" x2="608" y2="84" marker-end="url(#arrow)"/>
  <line class="flow" x1="738" y1="84" x2="756" y2="84" marker-end="url(#arrow)"/>

  <g class="step">
    <rect class="box" x="16" y="52" width="130" height="64" rx="11"/><rect class="accent" x="16" y="52" width="130" height="4" rx="2"/>
    <text class="num" x="81" y="74">01</text><text class="lbl" x="81" y="98">Briefing</text>
  </g>
  <g class="step">
    <rect class="box" x="164" y="52" width="130" height="64" rx="11"/><rect class="accent" x="164" y="52" width="130" height="4" rx="2"/>
    <text class="num" x="229" y="74">02</text><text class="lbl" x="229" y="98">Geração (IA)</text>
  </g>
  <g class="step">
    <rect class="box" x="312" y="52" width="130" height="64" rx="11"/><rect class="accent" x="312" y="52" width="130" height="4" rx="2"/>
    <text class="num" x="377" y="74">03</text>
    <text class="lbl" x="377" y="94">Revisão</text><text class="lbl" x="377" y="110">e refino</text>
  </g>
  <g class="step">
    <rect class="box" x="460" y="52" width="130" height="64" rx="11"/><rect class="accent" x="460" y="52" width="130" height="4" rx="2"/>
    <text class="num" x="525" y="74">04</text>
    <text class="lbl" x="525" y="94">Render</text><text class="lbl" x="525" y="110">da mídia</text>
  </g>
  <g class="step">
    <rect class="box" x="608" y="52" width="130" height="64" rx="11"/><rect class="accent" x="608" y="52" width="130" height="4" rx="2"/>
    <text class="num" x="673" y="74">05</text><text class="lbl" x="673" y="98">Aprovação</text>
  </g>
  <g class="step">
    <rect class="box" x="756" y="52" width="148" height="64" rx="11"/><rect class="accent" x="756" y="52" width="148" height="4" rx="2"/>
    <text class="num" x="830" y="74">06</text>
    <text class="lbl" x="830" y="94">Publicação</text><text class="lbl" x="830" y="110">(assistida)</text>
  </g>

  <text x="16" y="32" fill="#003554" font-size="14" font-weight="700">Do briefing à publicação</text>
  <text x="904" y="32" fill="#5b7180" font-size="11.5" text-anchor="end">cada etapa acontece no painel</text>
</svg>
