<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet"/>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:1080px; height:1350px; }
  .card {
    position:relative; width:1080px; height:1350px; overflow:hidden;
    background: radial-gradient(120% 120% at 80% 10%, #006494 0%, #003554 42%, #07212B 100%);
    color:#D9DCD6; font-family:'Inter',sans-serif;
    display:flex; flex-direction:column; justify-content:space-between;
    padding:96px 92px;
  }
  .dots { position:absolute; inset:0;
    background-image: radial-gradient(#5499B522 2px, transparent 2px);
    background-size: 46px 46px; opacity:.5; }
  .top { position:relative; display:flex; align-items:center; justify-content:space-between; }
  .logo { height:54px; }
  .badge { font-family:'JetBrains Mono',monospace; font-size:30px; letter-spacing:1px;
    color:#07212B; background:#5499B5; padding:10px 22px; border-radius:999px; font-weight:500; }
  .mid { position:relative; }
  .eyebrow { font-family:'JetBrains Mono',monospace; color:#5499B5;
    font-size:32px; letter-spacing:3px; text-transform:uppercase; margin-bottom:30px; }
  .headline { font-weight:900; font-size:120px; line-height:0.98;
    color:#FFFFFF; letter-spacing:-2px; }
  .headline .accent { color:#5499B5; }
  .subtext { margin-top:36px; font-size:40px; line-height:1.34; color:#AFBCC9;
    max-width:90%; font-weight:400; }
  .bottom { position:relative; display:flex; align-items:center; justify-content:space-between; }
  .cta { font-weight:800; font-size:36px; color:#07212B;
    background:#006494; color:#FFFFFF; padding:26px 48px; border-radius:999px; }
  .footer { font-family:'JetBrains Mono',monospace; font-size:26px; color:#AFBCC9; opacity:.85; }
</style></head>
<body><div class="card"><div class="dots"></div>
  <div class="top">
    <img class="logo" src="file:///C:/Users/Administrator/Documents/Agentes_Marketing_4Selet/Claude Equipe de Marketing - 6 Agentes/assets/logo-4selet-light.png" alt="4Selet"/>
    <span class="badge">#TaxaZero</span>
  </div>
  <div class="mid">
    <div class="eyebrow">Feed</div>
    <div class="headline"><span class="accent">0% </span>de taxa por <span class="accent">3 </span>meses. <span class="accent">R$ 1,99</span> por transação. PIX em <span class="accent">D+10</span>.</div>
    
  </div>
  <div class="bottom">
    <span class="cta">Solicitar convite →</span>
    <span class="footer">Para quem sabe que e Selet.</span>
  </div>
</div></body></html>
